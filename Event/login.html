<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Eventure</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .register-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
            background: #f8f9fa;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }
        .register-header {
            background-color: #000;
            color: #c7acd9;
            padding: 30px;
            text-align: center;
        }
        .btn-register {
            background-color: #9f4dd5;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-register:hover {
            background-color: #8a3fbc;
            color: white;
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: #9f4dd5;
            box-shadow: 0 0 0 0.25rem rgba(159, 77, 213, 0.25);
        }
    </style>
</head>
<body>
    <div id="registration_navbar"></div>
    <!-- REGISTRATION FORM SECTION -->
    <section class="register-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-6 col-lg-5">
                    <div class="register-card">
                        <div class="register-header">
                            <h2 class="fw-bold mb-0">EVENTURE</h2>
                        </div>
                        <div class="card-body p-4 p-md-5 bg-white">
                            <form id="loginForm">

                                <div class="mb-3">
                                  <label class="form-label small fw-bold">Email</label>
                                  <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                      <i class="fas fa-envelope text-muted"></i>
                                    </span>
                                    <input
                                      type="email"
                                      id="loginEmail"
                                      class="form-control bg-light border-start-0"
                                      placeholder="john@example.com"
                                      required
                                    >
                                  </div>
                                </div>
                              
                                <div class="mb-3">
                                  <label class="form-label small fw-bold">Password</label>
                                  <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                      <i class="fas fa-lock text-muted"></i>
                                    </span>
                                    <input
                                      type="password"
                                      id="loginPassword"
                                      class="form-control bg-light border-start-0"
                                      placeholder="••••••••"
                                      required
                                    >
                                  </div>
                                </div>
                              
                                <button type="submit" class="btn btn-register w-100 rounded-pill shadow-sm">
                                    Login
                                </button>
                                <div class="text-center mt-4">
                                  <p class="small text-muted">Don't have an account? <a href="registration.html" class="text-decoration-none fw-bold" style="color: #9f4dd5;">Signup</a></p>
                                </div>
                              </form>
                              
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- FOOTER -->
    <div id="footer"></div>
    <script type="module" src="script.js"></script>
    <script type="module">
        import { auth } from "./firebase.js";
        import { signInWithEmailAndPassword }
          from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
      
        const form = document.getElementById("loginForm");
        const emailInput = document.getElementById("loginEmail");
        const passwordInput = document.getElementById("loginPassword");
      
        form.addEventListener("submit", (e) => {
          e.preventDefault();
      
          signInWithEmailAndPassword(
            auth,
            emailInput.value,
            passwordInput.value
          )
          .then(() => {
            const params = new URLSearchParams(window.location.search);
            const redirectUrl = params.get("redirect");

            if (redirectUrl) {
              window.location.href = redirectUrl;
            } else {
              window.location.href = "index.html";
            }

          })
          .catch(err => alert(err.message));
        });
      </script>      
      
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
